<!DOCTYPE html>
<!--
  base.html — Base template
  All other templates extend this one using Jinja2's template inheritance.
  This keeps the navbar, footer, and Bootstrap imports in one place.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Friend Finder{% endblock %} — FriendGraph</title>

  <!-- Bootstrap 5 CSS (CDN) -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />
  <!-- Our custom styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>

<body>

  <!-- ===== Navbar ===== -->
  <nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('index') }}">
        <i class="bi bi-diagram-3-fill me-2"></i>FriendGraph
      </a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('index') }}">
              <i class="bi bi-house me-1"></i>Home
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('about') }}">
              <i class="bi bi-info-circle me-1"></i>How It Works
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ===== Page content — child templates fill this block ===== -->
  <main class="container pb-5">
    {% block content %}{% endblock %}
  </main>

  <!-- ===== Footer ===== -->
  <footer class="text-center">
    <div class="container">
      <p class="mb-0">
        <i class="bi bi-diagram-3 me-1"></i>
        FriendGraph &mdash; Built with Flask &amp; NetworkX &middot;
        Capstone Project Demo
      </p>
    </div>
  </footer>

  <!-- Bootstrap 5 JS bundle (includes Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
